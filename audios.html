<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Audio Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display:block; padding: 40px;">
    <div style="max-width: 600px; margin: auto; background: var(--panel-color); padding: 30px; border-radius: 20px; border: 1px solid #333;">
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <h1 style="color: var(--accent-pink);">♫ AUDIOS</h1>
            <a href="index.html" class="btn-nav" style="padding: 10px 20px;">ATRÁS</a>
        </div>
        <div id="listaCanciones" style="margin-top: 20px;"></div>
    </div>
    <script src="app.js"></script>
   <script>
    const usuario = "torresleonanderson-cmd";
    const repo = "mi-planta-pro";
    const carpeta = "audios";

    async function cargarAudiosAutomaticamente() {
        const contenedor = document.getElementById('listaCanciones');
        contenedor.innerHTML = "<p style='color:white;'>Buscando música nueva...</p>";

        try {
            const response = await fetch(`https://api.github.com/repos/${usuario}/${repo}/contents/${carpeta}`);
            const archivos = await response.json();

            contenedor.innerHTML = "";

            archivos.forEach(archivo => {
                // Solo agregar si es un archivo de audio (mp3, wav)
                if (archivo.name.endsWith('.mp3') || archivo.name.endsWith('.wav')) {
                    const item = document.createElement('div');
                    item.className = 'btn-nav';
                    item.style.marginBottom = '10px';
                    item.style.cursor = 'pointer';
                    item.innerHTML = `♫ ${archivo.name}`;
                    
                    item.onclick = () => {
                        localStorage.setItem('reproducirRuta', `${carpeta}/${archivo.name}`);
                        localStorage.setItem('reproducirTipo', 'audio');
                        localStorage.setItem('reproducirNombre', archivo.name);
                        window.location.href = 'index.html';
                    };
                    contenedor.appendChild(item);
                }
            });
        } catch (error) {
            contenedor.innerHTML = "<p style='color:red;'>Error al conectar con la biblioteca</p>";
        }
    }

    cargarAudiosAutomaticamente();
</script>
</body>
</html>
