<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Video Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display:block; padding: 40px;">
    <div style="max-width: 600px; margin: auto; background: var(--panel-color); padding: 30px; border-radius: 20px; border: 1px solid #333;">
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <h1 style="color: var(--accent-cyan);">▶ VIDEOS</h1>
            <a href="index.html" class="btn-nav" style="padding: 10px 20px;">ATRÁS</a>
        </div>
        <div id="listaVideos" style="margin-top: 20px;"></div>
    </div>
    <script src="app.js"></script>
   <script>
    // Configuración de tu repo
    const usuario = "torresleonanderson-cmd";
    const repo = "mi-planta-pro";
    const carpeta = "videos";

    async function cargarVideosAutomaticamente() {
        const contenedor = document.getElementById('listaVideos');
        contenedor.innerHTML = "<p style='color:white;'>Buscando videos nuevos...</p>";

        try {
            // Le pedimos la lista de archivos a GitHub
            const response = await fetch(`https://api.github.com/repos/${usuario}/${repo}/contents/${carpeta}`);
            const archivos = await response.json();

            contenedor.innerHTML = ""; // Limpiamos el mensaje de carga

            archivos.forEach(archivo => {
                // Solo agregar si es un archivo de video (mp4, webm, etc)
                if (archivo.name.endsWith('.mp4') || archivo.name.endsWith('.webm')) {
                    const item = document.createElement('div');
                    item.className = 'btn-nav';
                    item.style.marginBottom = '10px';
                    item.style.cursor = 'pointer';
                    item.innerHTML = `🎬 ${archivo.name}`;
                    
                    item.onclick = () => {
                        localStorage.setItem('reproducirRuta', `${carpeta}/${archivo.name}`);
                        localStorage.setItem('reproducirTipo', 'video');
                        localStorage.setItem('reproducirNombre', archivo.name);
                        window.location.href = 'index.html';
                    };
                    contenedor.appendChild(item);
                }
            });
        } catch (error) {
            contenedor.innerHTML = "<p style='color:red;'>Error al conectar con la biblioteca</p>";
            console.error(error);
        }
    }

    // Ejecutar al abrir la página
    cargarVideosAutomaticamente();
</script>
</body>
</html>
